# ScheduleLab Production Compose

# Include the official Supabase stack
include:
  - .supabase-docker/docker-compose.yml

services:
  # Next.js Application Production Build
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8000}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-none}
    container_name: schedulelab-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8000}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-none}
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-password}@db:5432/postgres
      # Internal routing for server-side Next.js fetches
      - SUPABASE_INTERNAL_URL=${SUPABASE_INTERNAL_URL:-http://kong:8000}
    depends_on:
      kong:
        condition: service_healthy
      db:
        condition: service_healthy

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: schedulelab-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - kong
